<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizBattle – Tạo Quiz</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/editor.css">
  <style>
    .app-nav { display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100; }
    .nav-logo { font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--primary-light); }
    .nav-logo span { color:var(--accent); }
    .nav-tabs { display:flex;gap:4px; }
    .nav-tab { padding:6px 14px;border-radius:var(--pill);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s; }
    .nav-tab.active { background:var(--surface2);color:var(--text);border:1px solid var(--border2); }
    .nav-tab:hover:not(.active) { color:var(--text); }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>

<div class="editor-wrap">
  <!-- Sidebar -->
  <div class="editor-sidebar">
    <div style="padding:8px;margin-bottom:8px">
      <input class="form-input" placeholder="Tên quiz..." value="🌍 Địa Lý Thế Giới" style="font-family:'Syne',sans-serif;font-weight:700">
      <div style="display:flex;gap:8px;margin-top:10px">
        <select style="flex:1;padding:6px 10px;border-radius:8px;background:var(--surface2);border:1px solid var(--border2);color:var(--muted);font-size:12px;outline:none">
          <option>🔒 Private</option>
          <option>🌍 Public</option>
        </select>
      </div>
    </div>

    <div class="es-title">Câu hỏi (3)</div>
    <div class="es-q-item active">
      <div class="es-q-num">1</div>
      <div class="es-q-text">Thủ đô của Nhật Bản?</div>
    </div>
    <div class="es-q-item">
      <div class="es-q-num">2</div>
      <div class="es-q-text">Úc là một lục địa?</div>
    </div>
    <div class="es-q-item">
      <div class="es-q-num">3</div>
      <div class="es-q-text">Sông dài nhất thế giới?</div>
    </div>
    <button class="es-add">+ Thêm câu hỏi</button>

    <div style="margin-top:auto;padding:8px;display:flex;flex-direction:column;gap:8px">
      <button class="btn-save" style="width:100%">💾 Lưu</button>
      <button class="btn-publish" style="width:100%" onclick="navigateTo('create-room')">🚀 Lưu & Chơi</button>
    </div>
  </div>

  <!-- Main editor panel -->
  <div class="editor-main">
    <div class="editor-main-header">
      <h2 class="em-title">Câu hỏi 1 / 3</h2>
      <div style="display:flex;gap:8px">
        <button style="padding:7px 14px;border-radius:8px;background:transparent;border:1px solid var(--border2);color:var(--muted);font-size:13px;cursor:pointer">🗑 Xóa</button>
        <button style="padding:7px 14px;border-radius:8px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:13px;cursor:pointer">⬆ Di chuyển</button>
      </div>
    </div>

    <div class="question-editor">
      <div class="qe-top">
        <div class="qe-type-toggle">
          <button class="qe-type-btn active">Trắc nghiệm</button>
          <button class="qe-type-btn">Đúng / Sai</button>
        </div>
        <div class="qe-time">⏱ Thời gian:</div>
        <div class="time-select">
          <button class="time-chip">10s</button>
          <button class="time-chip">20s</button>
          <button class="time-chip active">30s</button>
          <button class="time-chip">60s</button>
        </div>
        <div style="margin-left:auto;font-size:12px;color:var(--muted)">Điểm: <span style="color:var(--gold);font-weight:700">100</span></div>
      </div>

      <textarea class="qe-textarea" rows="3">Thủ đô của Nhật Bản là gì?</textarea>
      <div style="font-size:12px;color:var(--muted);margin:12px 0 6px">Đáp án (chọn đáp án đúng ✓):</div>
      <div class="options-editor">
        <div class="option-editor">
          <div class="opt-letter">A</div>
          <input class="opt-input" value="Osaka">
          <button class="opt-correct-btn"></button>
        </div>
        <div class="option-editor correct">
          <div class="opt-letter">B</div>
          <input class="opt-input" value="Tokyo">
          <button class="opt-correct-btn checked">✓</button>
        </div>
        <div class="option-editor">
          <div class="opt-letter">C</div>
          <input class="opt-input" value="Kyoto">
          <button class="opt-correct-btn"></button>
        </div>
        <div class="option-editor">
          <div class="opt-letter">D</div>
          <input class="opt-input" value="Nagoya">
          <button class="opt-correct-btn"></button>
        </div>
      </div>
    </div>

    <!-- Preview -->
    <div style="background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:20px">
      <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:12px;color:var(--muted)">Preview câu hỏi</div>
      <div style="background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:14px;padding:20px;text-align:center;font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:12px">Thủ đô của Nhật Bản là gì?</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div style="padding:10px;border-radius:10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);font-size:13px;display:flex;gap:8px;align-items:center"><span style="font-family:'JetBrains Mono',monospace;font-weight:700">A</span>Osaka</div>
        <div style="padding:10px;border-radius:10px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);font-size:13px;display:flex;gap:8px;align-items:center"><span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--green)">B</span>Tokyo ✓</div>
        <div style="padding:10px;border-radius:10px;background:var(--surface);border:1px solid var(--border2);font-size:13px;display:flex;gap:8px;align-items:center"><span style="font-family:'JetBrains Mono',monospace;font-weight:700">C</span>Kyoto</div>
        <div style="padding:10px;border-radius:10px;background:var(--surface);border:1px solid var(--border2);font-size:13px;display:flex;gap:8px;align-items:center"><span style="font-family:'JetBrains Mono',monospace;font-weight:700">D</span>Nagoya</div>
      </div>
    </div>
  </div>
</div>

<script src="../js/shared.js"></script>
<script src="../js/editor.js"></script>
<script>document.addEventListener('DOMContentLoaded', () => renderNav('editor'));</script>
</body>
</html>
