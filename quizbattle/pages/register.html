<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizBattle – Đăng ký</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/register.css">
  <style>
    .app-nav { display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100; }
    .nav-logo { font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--primary-light); }
    .nav-logo span { color:var(--accent); }
    .nav-tabs { display:flex;gap:4px; }
    .nav-tab { padding:6px 14px;border-radius:var(--pill);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s; }
    .nav-tab.active { background:var(--surface2);color:var(--text);border:1px solid var(--border2); }
    .nav-tab:hover:not(.active) { color:var(--text); }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>

<div class="register-wrap">
  <div class="register-bg"></div>
  <div class="register-card">
    <div class="step-dots">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>
    <div class="register-header">
      <h2 class="register-title">Tạo tài khoản 🎮</h2>
      <p class="register-sub">Tham gia hàng nghìn người chơi đang đấu quiz mỗi ngày</p>
    </div>

    <div class="form-row">
      <div class="form-group"><label class="form-label">Họ</label><input class="form-input" placeholder="Nguyễn"></div>
      <div class="form-group"><label class="form-label">Tên</label><input class="form-input" placeholder="Minh Khoa"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Tên đăng nhập (username)</label>
      <input class="form-input" placeholder="minhkhoa_99">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="form-label">Mật khẩu</label>
      <input class="form-input" type="password" placeholder="Tối thiểu 8 ký tự, có chữ hoa và số" id="passwordInput">
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div style="font-size:11px;color:var(--gold);margin-top:4px" id="strengthLabel">⚡ Mật khẩu khá mạnh</div>
    </div>
    <div class="form-group">
      <label class="form-label">Xác nhận mật khẩu</label>
      <input class="form-input" type="password" placeholder="Nhập lại mật khẩu">
    </div>

    <button class="btn-primary" style="margin-top:8px" onclick="navigateTo('home')">Tạo tài khoản →</button>
    <p class="login-footer">Đã có tài khoản? <span class="link" onclick="navigateTo('login')">Đăng nhập</span></p>
  </div>
</div>

<script src="../js/shared.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => renderNav('register'));

  // Simple password strength indicator
  const input  = document.getElementById('passwordInput');
  const fill   = document.getElementById('strengthFill');
  const label  = document.getElementById('strengthLabel');
  if (input) {
    input.addEventListener('input', () => {
      const v = input.value;
      let score = 0;
      if (v.length >= 8) score++;
      if (/[A-Z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      const pct = (score / 4) * 100;
      fill.style.width = pct + '%';
      const colors = ['var(--red)','var(--gold)','var(--gold)','var(--green)'];
      const texts  = ['🔴 Yếu','🟡 Trung bình','🟡 Khá mạnh','🟢 Mạnh'];
      fill.style.background = colors[score - 1] || 'var(--border2)';
      label.textContent = texts[score - 1] || '';
    });
  }
</script>
</body>
</html>
